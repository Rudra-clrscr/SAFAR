<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFAR | Blockchain Security Auditor</title>
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #121212;
            --accent: #ff00ff;
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #888;
            font-style: italic;
        }

        .status-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid currentColor;
            margin-top: 1rem;
        }

        .status-badge.secure {
            color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }

        .blockchain-grid {
            display: grid;
            gap: 1.5rem;
        }

        .block-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            border-left: 5px solid var(--primary);
            position: relative;
            transition: transform 0.3s ease;
        }

        .block-card:hover {
            transform: translateX(10px);
        }

        .block-card .index {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 1.2rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.1);
        }

        .block-card h3 {
            margin-top: 0;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .block-card .hash {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            word-break: break-all;
            background: #000;
            padding: 0.5rem;
            border-radius: 4px;
            margin: 0.5rem 0;
            border: 1px solid #333;
        }

        .block-card .prev-hash {
            color: #888;
            font-size: 0.75rem;
        }

        .meta {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
            margin-top: 1rem;
            color: #aaa;
        }

        .audit-info {
            background: rgba(0, 255, 204, 0.05);
            border: 1px dashed var(--primary);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.05;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }
    </style>
</head>
<body>
    <div class="matrix-bg"></div>
    <div class="container">
        <div class="header">
            <h1>🛡️ SAFAR Blockchain Ledger</h1>
            <p>Immutable Identity Security Protocol v2026.1</p>
            <div id="chain-status" class="status-badge secure">Auditing...</div>
        </div>

        <div class="audit-info" id="audit-stats">
            <div>
                <strong>Total Blocks:</strong> <span id="block-count">Loading...</span><br>
                <strong>Encryption:</strong> SHA-256 (Industrial Standard)
            </div>
            <div>
                <strong>Last Audit:</strong> <span id="last-audit">Never</span>
            </div>
        </div>

        <div id="blockchain-list" class="blockchain-grid">
            <!-- Blocks will be injected here -->
        </div>
    </div>

    <script>
        async function loadAudit() {
            try {
                const response = await fetch('/api/blockchain/verify');
                const data = await response.json();
                
                document.getElementById('block-count').innerText = data.block_count;
                document.getElementById('last-audit').innerText = new Date(data.audit_time).toLocaleTimeString();
                
                const status = document.getElementById('chain-status');
                if (data.integrity_verified) {
                    status.innerText = "System Integrity: SECURE";
                    status.classList.add('secure');
                } else {
                    status.innerText = "CRITICAL: CHAIN TAMPERED";
                    status.style.color = "#ff4d4d";
                }

                // Load individual blocks (fetching from a separate endpoint we'll add)
                const blocksRes = await fetch('/api/blockchain/blocks');
                const blocks = await blocksRes.json();
                
                const list = document.getElementById('blockchain-list');
                list.innerHTML = "";
                
                blocks.reverse().forEach(block => {
                    const card = document.createElement('div');
                    card.className = "block-card";
                    card.innerHTML = `
                        <div class="index">#${block.index}</div>
                        <h3>📌 ${block.event_type} Event</h3>
                        <div class="prev-hash">PREVIOUS HASH: ${block.previous_hash}</div>
                        <div class="hash">CURRENT HASH: ${block.block_hash}</div>
                        <div class="meta">
                            <span>User: ${block.user_id.substring(0,8)}...</span>
                            <span>Time: ${new Date(block.timestamp).toLocaleString()}</span>
                        </div>
                    `;
                    list.appendChild(card);
                });
            } catch (err) {
                console.error("Audit failed", err);
            }
        }

        loadAudit();
        setInterval(loadAudit, 10000); // Re-audit every 10 seconds
    </script>
</body>
</html>
